name: e2e-ios
on:
  workflow_dispatch:
    inputs:
      api_url:
        type: string
        required: true

jobs:
  build_ios_e2e:
    name: Build iOS simulator app (e2e)
    type: build
    environment: development
    env:
      EXPO_PUBLIC_API_URL: ${{ inputs.api_url }}
    params:
      platform: ios
      profile: e2e-test

  maestro_ios:
    name: Maestro E2E (iOS simulator)
    needs: [build_ios_e2e]
    type: maestro
    env:
      API_URL: ${{ inputs.api_url }}
    params:
      build_id: ${{ needs.build_ios_e2e.outputs.build_id }}
      retries: 2
      flow_path:
        - .maestro/flows/sign-in.yml
    hooks:
      before_maestro_tests:
        - name: Wait for preview API
          run: |
            for i in $(seq 1 60); do
              code=$(curl -s -o /dev/null -w '%{http_code}' "$API_URL/api/auth/ok" || true)
              if [ "$code" = "200" ]; then
                echo "API ready"
                curl -s -o /dev/null --max-time 30 "$API_URL/api/auth/get-session" || true
                exit 0
              fi
              echo "attempt $i/60: HTTP $code"
              sleep 10
            done
            echo "preview API never became healthy"
            exit 1
