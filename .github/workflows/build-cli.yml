name: Build CLI

# Reusable build workflow. Callers (ci-cli.yml, release-cli.yml) pass a
# matrix as JSON to control which targets to build.

on:
  workflow_call:
    inputs:
      targets:
        description: 'JSON array of {os, target} build matrix entries'
        required: true
        type: string
      upload:
        description: 'Upload built tarballs as artifacts (release pipeline needs them; PR CI does not)'
        required: false
        type: boolean
        default: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(inputs.targets) }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Setup Node.js (for native addon compilation)
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22

      - name: Install dependencies (Linux — skip scripts, rebuild manually)
        if: startsWith(matrix.target, 'linux-')
        run: |
          # Bun's install-script runner has a cache materialization race
          # against node-pty's compile-from-source path on Linux (node-pty
          # ships no Linux prebuilds). Skip scripts at install, then rebuild
          # native deps explicitly via npm/node-gyp.
          #
          # better-sqlite3 is intentionally NOT rebuilt here: build-dist.ts's
          # fixNativeBinariesForNode() unconditionally downloads the matching
          # Node-ABI prebuild from GitHub releases and overwrites the .node
          # file. Running `npm rebuild better-sqlite3` here is redundant work
          # and a CI flake source — its `prebuild-install || node-gyp rebuild`
          # install script intermittently truncates the prebuild download or
          # leaves partial state that breaks the gyp fallback on linux-x64.
          set -euo pipefail
          bun install --frozen --ignore-scripts
          PTY_DIR=$(ls -d node_modules/.bun/node-pty@*/node_modules/node-pty)
          (cd "$PTY_DIR" && npx --yes node-gyp rebuild)
          npm rebuild @parcel/watcher

      - name: Install dependencies (macOS)
        if: startsWith(matrix.target, 'darwin-')
        run: bun install --frozen

      - name: Build distribution
        working-directory: packages/cli
        env:
          RELAY_URL: ${{ secrets.RELAY_URL }}
          SUPERSET_API_URL: ${{ vars.SUPERSET_API_URL }}
          SUPERSET_WEB_URL: ${{ vars.SUPERSET_WEB_URL }}
        run: bun run build:dist --target=${{ matrix.target }}

      - name: Smoke test binary
        run: |
          DIST="$(pwd)/packages/cli/dist/superset-${{ matrix.target }}"
          bash packages/cli/scripts/smoke-test.sh "$DIST" "${{ matrix.target }}"

      - name: Upload tarball
        if: inputs.upload
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: superset-${{ matrix.target }}
          path: packages/cli/dist/superset-${{ matrix.target }}.tar.gz
          if-no-files-found: error
