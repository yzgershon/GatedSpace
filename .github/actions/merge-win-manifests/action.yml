name: Merge Windows Auto-Update Manifests
description: >
  Downloads x64 and arm64 Windows update manifests from separate build artifacts
  and merges them into a single manifest with entries for both architectures.
  x64 is used as the canonical base (path/sha512) since electron-updater falls
  back to it when no arch-specific entry matches.

inputs:
  artifact-prefix:
    description: "Artifact name prefix (e.g., 'desktop' or 'desktop-canary')"
    required: true
  artifacts-path:
    description: "Path to the release artifacts directory"
    required: false
    default: release-artifacts
  manifest-name:
    description: "Channel manifest filename to merge and write (e.g., 'latest.yml' or 'canary.yml')"
    required: false
    default: latest.yml
  extra-manifest-names:
    description: "Comma-separated list of additional manifest filenames to write (e.g., 'latest.yml' as a fallback copy of canary.yml)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Download x64 Windows update manifest
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-prefix }}-win-x64-update-manifest
        path: win-manifests/x64

    - name: Download arm64 Windows update manifest
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact-prefix }}-win-arm64-update-manifest
        path: win-manifests/arm64

    - name: Merge Windows auto-update manifests
      shell: bash
      run: |
        node .github/actions/merge-win-manifests/merge-win-manifests.mjs \
          --x64-dir win-manifests/x64 \
          --arm64-dir win-manifests/arm64 \
          --manifest-name "${{ inputs.manifest-name }}" \
          --output "${{ inputs.artifacts-path }}/${{ inputs.manifest-name }}" \
          --extra-manifest-names "${{ inputs.extra-manifest-names }}"
